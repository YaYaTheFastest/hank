<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="theme-color" content="#367C2B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="HANK">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>HANK · Ranch Equipment</title>
<style>
  :root{--green:#367C2B;--green-d:#2a5f22;--ink:#1c2419;--muted:#6b7464;--line:#e4e7df;
    --bg:#f6f7f3;--card:#fff;--red:#d24b3e;--amber:#e0a426;--ok:#3f9e4d;--chip:#eef1ea}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;padding-bottom:calc(82px + env(safe-area-inset-bottom))}
  header{background:linear-gradient(135deg,var(--green),var(--green-d));color:#fff;
    padding:calc(16px + env(safe-area-inset-top)) 18px 0;position:sticky;top:0;z-index:10}
  header h1{margin:0;font-size:19px;letter-spacing:.2px}
  header p{margin:2px 0 0;opacity:.85;font-size:12.5px}
  .tabs{display:flex;gap:6px;margin-top:12px}
  .tabs a{color:#fff;text-decoration:none;font-size:14px;font-weight:600;padding:9px 14px;border-radius:10px 10px 0 0;opacity:.7;cursor:pointer}
  .tabs a.active{background:var(--bg);color:var(--green);opacity:1}
  .search{margin:12px 16px 0;display:flex;gap:8px}
  .search input{flex:1;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:15px;background:#fff}
  .chips{display:flex;gap:7px;overflow-x:auto;padding:12px 16px 4px;-webkit-overflow-scrolling:touch}
  .chip{white-space:nowrap;border:1px solid var(--line);background:#fff;color:var(--muted);
    border-radius:999px;padding:7px 13px;font-size:13px;font-weight:600;cursor:pointer}
  .chip.active{background:var(--green);color:#fff;border-color:var(--green)}
  .group{padding:6px 16px 0}
  .group h2{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:14px 0 8px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(min-width:620px){.grid{grid-template-columns:1fr 1fr 1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--line);border-radius:14px;padding:12px;
    box-shadow:0 1px 2px rgba(0,0,0,.04);text-align:left;cursor:pointer}
  .card.full{border-left-color:var(--ok)}.card.part{border-left-color:var(--amber)}.card.todo{border-left-color:#c7ccc0}
  .card .nm{font-weight:700;font-size:14px;line-height:1.2}
  .card .tags{margin-top:7px;display:flex;flex-wrap:wrap;gap:4px}
  .t{background:var(--chip);color:#46503c;border-radius:6px;padding:2px 7px;font-size:10.5px;font-weight:600}
  .st{display:inline-flex;align-items:center;gap:5px;margin-top:9px;font-size:11px;font-weight:700}
  .st .dot{width:8px;height:8px;border-radius:50%}
  .full{color:var(--ok)}.full .dot{background:var(--ok)}
  .part{color:var(--amber)}.part .dot{background:var(--amber)}
  .todo{color:var(--muted)}.todo .dot{background:var(--muted)}
  .hint{margin-top:6px;font-size:11px;color:var(--muted);line-height:1.3}
  /* dashboard */
  .dash{padding:14px 16px 0}
  .dsec{background:#fff;border:1px solid var(--line);border-radius:14px;padding:15px;margin-bottom:12px}
  .dsec h3{margin:0 0 4px;font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--green)}
  .dsec .lead{color:var(--muted);font-size:12.5px;margin:0 0 12px}
  .stats{display:flex;gap:8px;text-align:center}
  .stat{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:10px 6px}
  .stat b{display:block;font-size:22px;line-height:1.1}
  .stat span{font-size:10.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.03em}
  .stat.g b{color:var(--ok)}.stat.a b{color:var(--amber)}.stat.m b{color:var(--muted)}
  .bar{height:9px;border-radius:6px;background:var(--line);overflow:hidden;margin:12px 0 6px;display:flex}
  .bar i{display:block;height:100%}
  .bar .bg{background:var(--ok)}.bar .ba{background:var(--amber)}.bar .bm{background:#c7ccc0}
  .barlbl{font-size:11.5px;color:var(--muted)}
  .att{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
  .att:last-child{border:0}
  .att .ic{width:9px;height:9px;border-radius:50%;margin-top:5px;flex:none}
  .att .ic.r{background:var(--red)}.att .ic.a{background:var(--amber)}.att .ic.n{background:#c7ccc0}
  .att .body{flex:1;font-size:13px}.att .body b{font-weight:700}
  .att .body .sub{color:var(--muted);font-size:11.5px;margin-top:1px}
  .att .go{color:var(--green);font-weight:700;font-size:12px;white-space:nowrap;cursor:pointer}
  .cta{display:flex;gap:9px;margin-top:4px}
  .cta button{flex:1;border:0;border-radius:11px;padding:12px;font-size:13.5px;font-weight:700;cursor:pointer}
  .cta .p{background:var(--green);color:#fff}.cta .s{background:var(--bg);color:var(--green);border:1px solid var(--green)}
  .sup{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
  .sup:last-child{border:0}.sup .k{font-weight:600}.sup .v{color:var(--muted);text-align:right;font-size:12px}
  .note{font-size:11.5px;color:var(--muted);margin-top:10px;line-height:1.4}
  /* detail */
  .sheet{position:fixed;inset:0;background:rgba(20,28,18,.4);display:none;z-index:50}
  .sheet.open{display:block}
  .panel{position:absolute;left:0;right:0;bottom:0;max-height:92vh;overflow-y:auto;background:var(--bg);
    border-radius:18px 18px 0 0;padding:18px 18px calc(28px + env(safe-area-inset-bottom))}
  @media(min-width:620px){.panel{left:50%;transform:translateX(-50%);max-width:560px;border-radius:18px;bottom:auto;top:50%;transform:translate(-50%,-50%)}}
  .ph{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .ph h3{margin:0;font-size:20px}.ph .sub{color:var(--muted);font-size:13px;margin-top:2px}
  .x{border:0;background:#fff;border:1px solid var(--line);border-radius:9px;width:34px;height:34px;font-size:17px;flex:none}
  .sec{background:#fff;border:1px solid var(--line);border-radius:13px;padding:14px;margin-top:12px}
  .sec h4{margin:0 0 9px;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--green)}
  .row{display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px solid var(--line);font-size:13.5px}
  .row:last-child{border:0}.row .k{color:var(--muted)}.row .v{font-weight:600;text-align:right}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th{text-align:left;color:var(--muted);font-size:10.5px;text-transform:uppercase;padding:5px 4px;border-bottom:2px solid var(--line)}
  td{padding:7px 4px;border-bottom:1px solid var(--line)}tr:last-child td{border:0}
  .rag{font-weight:700;font-size:11px}.rag.a{color:var(--amber)}.rag.g{color:var(--ok)}.rag.r{color:var(--red)}.rag.n{color:var(--muted)}
  details{border:1px solid var(--line);border-radius:10px;margin-bottom:8px;background:#fff}
  summary{padding:11px 13px;font-weight:600;font-size:13.5px;cursor:pointer}
  .jb{padding:0 13px 13px;font-size:13px}.jb ol{margin:6px 0 6px 18px;padding:0}.jb li{margin:4px 0}
  .lk{color:var(--green);font-weight:600;text-decoration:none;font-size:13.5px}
  .muted{color:var(--muted);font-size:12.5px}
  .verify{background:#fff7df;border:1px solid #f0e2a8;color:#6a5a12;font-size:10px;font-weight:700;padding:1px 6px;border-radius:5px}
  .logbtn{width:100%;margin-top:11px;border:0;border-radius:11px;padding:12px;background:var(--green);color:#fff;font-size:14px;font-weight:700;cursor:pointer}
  .chk{display:flex;flex-direction:column;gap:2px}
  .ck{display:flex;align-items:flex-start;gap:10px;padding:8px 2px;border-bottom:1px solid var(--line);font-size:13.5px;cursor:pointer}
  .ck:last-child{border:0}.ck input{width:20px;height:20px;margin-top:1px;flex:none;accent-color:var(--green)}
  .ck input:checked+span{color:var(--muted);text-decoration:line-through}
  .figs{margin-top:10px}
  .figimg{width:100%;border:1px solid var(--line);border-radius:8px;margin-top:8px;display:block}
  .vid{display:block;margin-top:10px;padding:11px 13px;background:#fdecea;border:1px solid #f1c3bd;border-radius:10px;color:var(--red);font-weight:700;font-size:13.5px;text-decoration:none}
  .empty{padding:40px 16px;text-align:center;color:var(--muted)}
  footer{padding:20px 16px;color:var(--muted);font-size:11.5px;text-align:center}
  .actionbar{position:fixed;left:0;right:0;bottom:0;display:flex;gap:10px;
    padding:10px 14px calc(10px + env(safe-area-inset-bottom));background:rgba(246,247,243,.96);
    border-top:1px solid var(--line);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:40}
  .actionbar button{flex:1;border:0;border-radius:12px;padding:13px;font-size:15px;font-weight:700}
  .btn-send{background:var(--green);color:#fff}
  .btn-ask{background:#fff;color:var(--green);border:1px solid var(--green)}
  .toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:#1c2419;color:#fff;
    padding:10px 16px;border-radius:10px;font-size:13px;z-index:60;max-width:88%;text-align:center;display:none}
  .thumb{display:flex;align-items:center;justify-content:center;min-height:40px;border-radius:8px;
    background:#eef1ea;color:var(--green);font-size:11px;font-weight:700;text-decoration:none;
    margin-bottom:8px;padding:6px 8px;text-align:center;word-break:break-word}
  .thumb span{color:#9aa291;font-weight:600}
  .hide{display:none}
</style>
</head>

<header>
  <h1>HANK · Ranch Equipment</h1>
  <p id="count">Loading…</p>
  <div class="tabs">
    <a id="tabDash" class="active" onclick="showView('dash')">Dashboard</a>

  </div>
</header>

<!-- DASHBOARD VIEW -->
<div id="dashView"><div class="dash" id="dash"></div></div>

<!-- EQUIPMENT VIEW -->
<div id="equipView" class="hide">
  <div class="search"><input id="q" type="search" placeholder="Search equipment…" autocomplete="off"></div>
  <div class="chips" id="chips"></div>
  <div id="list"></div>
  <footer>Tap a card for specs, maintenance &amp; job steps. Add to Home Screen for app mode.</footer>
</div>

<div class="sheet" id="sheet"><div class="panel" id="panel"></div></div>

<div class="actionbar">
  <button class="btn-ask" onclick="askHank()">Ask Hank</button>
  <button class="btn-send" onclick="document.getElementById('cap').click()">Send to Hank</button>
</div>
<input id="cap" type="file" accept="image/*" multiple style="display:none">
<div class="toast" id="toast"></div>

<script>
const BUILD_DATE="2026-06-28";
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.style.display='block';clearTimeout(t._h);t._h=setTimeout(()=>t.style.display='none',5200)}
const HANK_PRIME="You are HANK (Home And raNch Knowledge), Darren & his wife's household/ranch right-hand. Be true and honest above all — never invent specs/numbers; cite sources; flag uncertainty; admit mistakes. Voice: plainspoken, answer-first, concise, never naggy. If you can read the vault, load 00 Meta/Operating System/Project Hub.md for current state, then give a tight status. If not, say so and work from this.";
async function askHank(){
  try{await navigator.clipboard.writeText(HANK_PRIME);toast("Hank prime copied — paste it as your first message in Claude.");}
  catch(e){toast("Open Claude and paste your Hank prime (iCloud → HANK).");}
  setTimeout(()=>window.open("https://claude.ai/new","_blank"),900);
}
document.getElementById('cap').onchange=async(e)=>{
  const files=[...e.target.files];if(!files.length)return;
  if(navigator.canShare&&navigator.canShare({files})){
    try{await navigator.share({files,title:"For Hank",text:"Save to Files → _Cowork Inbox. Add a word like '4044M oil' or 'Z530R hours'."});toast("Choose 'Save to Files' → _Cowork Inbox. Hank takes it from there.");return;}catch(err){}
  }
  files.forEach(f=>{const a=document.createElement('a');a.href=URL.createObjectURL(f);a.download=f.name;a.click()});
  toast("Saved. On iPhone: Share → Save to Files → _Cowork Inbox. Tip: name it like '4044M oil'.");
};

// ---- helpers ----
function counts(){let f=0,p=0,t=0,tot=0;DATA.forEach(g=>g.items.forEach(it=>{tot++;if(it.st==="full")f++;else if(it.st==="part")p++;else t++;}));return{f,p,t,tot};}
function isSetup(txt){txt=(txt||"").toLowerCase();return !txt||txt==="—"||txt.includes("no hours")||txt.includes("set hours")||txt.includes("confirm")||txt.includes("offset");}
// gather attention items across the fleet
function attention(){
  const crit=[],seasonal=[];let needHours=0;const needHoursList=[];
  DATA.forEach(g=>g.items.forEach(it=>{
    if(it.basis==="Hours"&&it.specs){const hasUnset=(it.sched||[]).some(r=>isSetup(r[3]));if(hasUnset){needHours++;needHoursList.push(it.n);}}
    (it.sched||[]).forEach(r=>{
      const flag=(r[3]||"").toLowerCase();
      if(flag.includes("critical"))crit.push({n:it.n,task:r[0],sub:r[3],it});
      else if((r[1]||"").toLowerCase().includes("freeze")||(r[0]||"").toLowerCase().includes("winter"))seasonal.push({n:it.n,task:r[0],sub:r[1],it});
    });
  }));
  return{crit,seasonal,needHours,needHoursList};
}

// ---- views ----
function showView(v){
  const d=document.getElementById('dashView'),e=document.getElementById('equipView');
  document.getElementById('tabDash').classList.toggle('active',v==="dash");
  document.getElementById('tabEquip').classList.toggle('active',v==="equip");
  d.classList.toggle('hide',v!=="dash");e.classList.toggle('hide',v!=="equip");
  window.scrollTo(0,0);
}

function renderDash(){
  const c=counts(),a=attention();const pct=Math.round(c.f/c.tot*100);
  const wF=c.f/c.tot*100,wP=c.p/c.tot*100,wT=c.t/c.tot*100;
  let h="";
  // build status
  h+=`<div class="dsec"><h3>Build status</h3><p class="lead">How much of the fleet is at the full 2026-05 card standard.</p>
    <div class="stats">
      <div class="stat g"><b>${c.f}</b><span>Full</span></div>
      <div class="stat a"><b>${c.p}</b><span>Partial</span></div>
      <div class="stat m"><b>${c.t}</b><span>To induct</span></div>
      <div class="stat"><b>${pct}%</b><span>Complete</span></div>
    </div>
    <div class="bar"><i class="bg" style="width:${wF}%"></i><i class="ba" style="width:${wP}%"></i><i class="bm" style="width:${wT}%"></i></div>
    <div class="barlbl">${c.f} of ${c.tot} machines fully built · Hank is driving the rest to Full.</div></div>`;
  // needs attention
  h+=`<div class="dsec"><h3>Needs attention</h3><p class="lead">Flagged tasks and what's blocking live due-dates.</p>`;
  if(a.crit.length){a.crit.forEach(x=>{h+=`<div class="att"><span class="ic r"></span><div class="body"><b>${x.n}</b> — ${x.task}<div class="sub">${x.sub}</div></div><span class="go" onclick="openByName('${x.n.replace(/'/g,"\\'")}')">Open ›</span></div>`;});}
  // seasonal context (June = mowing season; winterize not due)
  h+=`<div class="att"><span class="ic a"></span><div class="body"><b>Mowing season is on</b><div class="sub">Keep deck blades sharp/balanced on the Z530R & X580. Winterize tasks (saws, pressure washer) aren't due until fall.</div></div></div>`;
  // set hours
  h+=`<div class="att"><span class="ic n"></span><div class="body"><b>${a.needHours} hour-based machines need a meter reading</b><div class="sub">Due-dates stay grey until Hank has a starting hour count. Snap the hour meter and send it.</div></div></div>`;
  h+=`<div class="cta"><button class="p" onclick="document.getElementById('cap').click()">📷 Send hour-meter photo</button><button class="s" onclick="askHank()">Ask Hank</button></div></div>`;
  // supplies
  h+=`<div class="dsec"><h3>Supplies · reorder reference</h3><p class="lead">Consumables pulled from the Full cards — a shopping reference for the shop.</p>`;
  SUPPLIES.forEach(s=>{h+=`<div class="sup"><span class="k">${s[0]}</span><span class="v">${s[1]}</span></div>`;});
  h+=`<div class="note">Quantities aren't tracked yet. When something runs low, snap it and send it — Hank adds it to a quantified reorder list for the shared shopping Reminders. <span class="verify">confirm fitment before buying</span></div></div>`;
  document.getElementById('dash').innerHTML=h;
}

function tileHint(it){
  if(it.st==="todo")return "Queued to induct";
  if(it.st==="part")return "Card in progress";
  // full: surface the most useful glance line
  const crit=(it.sched||[]).find(r=>(r[3]||"").toLowerCase().includes("critical"));
  if(crit)return "⚠ "+crit[0];
  if(it.basis==="Hours")return "Set hours to start clock";
  return "Ready · tap for job steps";
}
function render(){
  const list=document.getElementById('list');list.innerHTML="";let shown=0;
  DATA.forEach(d=>{
    if(filter!=="All"&&filter!==d.g)return;
    const items=d.items.filter(it=>it.n.toLowerCase().includes(query));
    if(!items.length)return;
    const sec=document.createElement('div');sec.className="group";
    sec.innerHTML=`<h2>${d.g}</h2>`;
    const grid=document.createElement('div');grid.className="grid";
    items.forEach(it=>{shown++;
      const c=document.createElement('div');c.className="card "+it.st;
      const u=URLS[it.n];
      c.innerHTML=`<a class="thumb" ${u?`href="${u}" target="_blank" rel="noopener" onclick="event.stopPropagation()"`:``}>${u?`↗ ${new URL(u).hostname.replace(/^www\./,'')}`:`<span>no factory link</span>`}</a><div class="nm">${it.n}</div>
        <div class="tags">${[it.power,it.loc,it.basis].filter(x=>x&&x!=="—").map(t=>`<span class="t">${t}</span>`).join("")}</div>
        <div class="st ${it.st}"><span class="dot"></span>${STLABEL[it.st]}</div>
        <div class="hint">${tileHint(it)}</div>`;
      c.onclick=()=>openDetail(it,d.g);
      grid.appendChild(c);
    });
    sec.appendChild(grid);list.appendChild(sec);
  });
  if(!shown)list.innerHTML='<div class="empty">No equipment matches.</div>';
}

  // r = [task, interval, rag, statusText]; show neutral instead of alarming red for "not set up yet"
  if(isSetup(r[3]))return `<td class="rag n">Set hours</td>`;
  if((r[3]||"").toLowerCase().includes("critical"))return `<td class="rag r">${r[3]}</td>`;
  return `<td class="rag ${r[2]}">${r[3]}</td>`;
}
function openDetail(it,g){
  const p=document.getElementById('panel');
  let h=`<div class="ph"><div><h3>${it.n}</h3><div class="sub">${g} · ${[it.power,it.loc,it.basis].filter(x=>x&&x!=="—").join(" · ")}</div></div><button class="x" onclick="closeSheet()">✕</button></div>`;
  const purl=URLS[it.n];
  if(purl)h+=`<div class="sec"><h4>Factory product page</h4><a class="lk" href="${purl}" target="_blank" rel="noopener">${new URL(purl).hostname.replace(/^www\./,'')} ↗</a></div>`;
  const pu=PREUSE[it.n];
  if(pu){h+=`<div class="sec"><h4>Pre-use checklist</h4><div class="chk">${pu.map(x=>`<label class="ck"><input type="checkbox"><span>${x}</span></label>`).join("")}</div></div>`}
  if(it.specs){h+=`<div class="sec"><h4>Specs</h4>${it.specs.map(s=>`<div class="row"><span class="k">${s[0]}</span><span class="v">${s[1]}</span></div>`).join("")}</div>`}
  if(it.sched){h+=`<div class="sec"><h4>Maintenance</h4><table><tr><th>Task</th><th>Interval</th><th>Status</th></tr>${it.sched.map(s=>`<tr><td>${s[0]}</td><td>${s[1]}</td>${ragCell(s)}</tr>`).join("")}</table><button class="logbtn" onclick="logMaint('${it.n.replace(/'/g,"\\'")}')">✓ Log maintenance done</button><div class="muted" style="margin-top:8px">Grey = waiting on a starting hour count. Tap <b>Log maintenance done</b> (or drop an hour-meter photo in <b>_Cowork Inbox</b>) and Hank updates the card &amp; due dates on the next pass. <span class="verify">confirm vs manual</span></div></div>`}
  if(it.jobs){h+=`<div class="sec"><h4>Job Cards</h4>${it.jobs.map(j=>`<details><summary>${j.t}</summary><div class="jb"><ol>${j.s.map(x=>`<li>${x}</li>`).join("")}</ol>${j.img?`<div class="figs">${j.img.map(src=>`<a href="${src}" target="_blank" rel="noopener"><img class="figimg" src="${src}" alt="manual figure — tap to enlarge" loading="lazy"></a>`).join("")}<div class="muted">Manual figures — tap to enlarge.</div></div>`:``}${j.video?`<a class="vid" href="${j.video}" target="_blank" rel="noopener">▶ Watch video walkthrough</a>`:``}</div></details>`).join("")}</div>`}
  if(it.manual||it.manualUrl){h+=`<div class="sec"><h4>Manual</h4>`+(it.manualUrl?`<a class="lk" href="${it.manualUrl}" target="_blank" rel="noopener">📄 Open ${it.manual||'manual'} ↗</a>`:`<div class="muted">${it.manual}</div>`)+`</div>`}
  if(!it.specs){h+=`<div class="sec"><div class="muted">Card in progress — Hank is bringing this machine to full standard. ${it.manual?"Manual is on file.":""}</div></div>`}
  p.innerHTML=h;document.getElementById('sheet').classList.add('open');
}
async function logMaint(name){
  const what=window.prompt("Log maintenance for "+name+"\n\nWhat did you do? Include a date or hours, e.g.:\n  • Winterized pump 3/1/26\n  • Oil & filter done at 12.3 h\n  • Blades sharpened today");
  if(!what)return;
  const today=new Date().toISOString().slice(0,10);
  const note="MAINTENANCE DONE\nMachine: "+name+"\nWork: "+what+"\nLogged: "+today+"\n\n(Hank: append to this card's Service History, update the matching Maintenance row / due date, and clear any dashboard flag.)";
  const fname=("done "+name+" "+what).replace(/[^a-z0-9]+/gi,"-").replace(/^-|-$/g,"").slice(0,48)+".txt";
  try{
    const file=new File([note],fname,{type:"text/plain"});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:"For Hank",text:"Save to Files → _Cowork Inbox. Hank logs it on the next pass."});
      toast("Saved — Hank updates the card on its next pass.");return;
    }
  }catch(e){}
  try{await navigator.clipboard.writeText(note);toast("Copied. Paste into _Cowork Inbox (or /log it) — Hank takes it from there.");}
  catch(e){toast("Note ready: drop “"+name+": "+what+"” into _Cowork Inbox.");}
}
function closeSheet(){document.getElementById('sheet').classList.remove('open')}
document.getElementById('sheet').onclick=e=>{if(e.target.id==="sheet")closeSheet()};

renderDash();
render();
</script>
